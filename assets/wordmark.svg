<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="480" viewBox="0 0 1600 480" fill="none">
  <defs>
    <style>
      @font-face {
        font-family: 'Realmint Brand';
        src: url(data:font/ttf;base64,) format('truetype');
        font-style: normal;
        font-weight: 700;
      }
      .brand-type {
        font-family: 'Realmint Brand', sans-serif;
        font-weight: 700;
        letter-spacing: -0.065em;
      }
    </style>
    
    <!-- Leaf icon gradients — #3ADFC3→#2BBDCA matches "mint" text exactly -->
    <linearGradient id="leafGrad" x1="34%" y1="4%" x2="66%" y2="96%">
      <stop offset="0%"   stop-color="#3ADFC3"/>
      <stop offset="100%" stop-color="#2BBDCA"/>
    </linearGradient>
    <radialGradient id="leafHighlight" cx="34%" cy="24%" r="66%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <path id="leafPath" d="M476.188 24.146c-6.748-3.504-60.728 38.022-185.304 67.086C230.347 105.355 62.5 153.527 65.286 392.815L0 431.218l20.338 35.598c63.073-40.692 236.014-120.042 409.766-323.621c0 0-26.875 134.419-334.096 311.056c103.685 53.758 249.604 53.758 360.979-76.806C568.346 246.888 476.188 24.146 476.188 24.146Z"/>
    <clipPath id="leafClip"><use href="#leafPath"/></clipPath>
    <linearGradient id="brandGradient" x1="900" y1="120" x2="1480" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3ADFC3"/>
      <stop offset="100%" stop-color="#2BBDCA"/>
    </linearGradient>
  </defs>

  <g transform="translate(96,98) scale(0.3929) translate(24,24)">
    <use href="#leafPath" fill="url(#leafGrad)"/>
    <g clip-path="url(#leafClip)">
      <use href="#leafPath" fill="url(#leafHighlight)"/>
    </g>
    <use href="#leafPath" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>
  </g>

  <text class="brand-type" x="340" y="298" font-size="252" fill="#F0F2F5" text-rendering="geometricPrecision">
    <tspan>real</tspan><tspan fill="url(#brandGradient)">mint</tspan>
  </text>
</svg>